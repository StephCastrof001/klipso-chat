name: Safety Gate

on:
  pull_request:
    branches: [ main ]

jobs:
  safety-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Evaluation Gate
        run: |
          python3 eval/run_eval.py
